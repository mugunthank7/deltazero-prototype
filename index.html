<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DeltaZero — Pipeline Agent Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
:root {
  --dz-accent: #0f3a8a;
  --dz-accent-soft: rgba(15,58,138,0.08);
  --dz-bg: #f4f6fa;
  --dz-panel: #ffffff;
  --dz-ink: #0b1426;
  --dz-ink-2: #475467;
  --dz-ink-3: #8694a8;
  --dz-line: #dfe3eb;
  --dz-line-2: #eef1f6;
  --dz-ok: #047857;
  --dz-bad: #b42318;
  --dz-warn: #b54708;
  --dz-radius: 10px;
}
[data-theme="dark"] {
  --dz-accent: #4f7ad9;
  --dz-accent-soft: rgba(79,122,217,0.16);
  --dz-bg: #0b1220;
  --dz-panel: #121a2c;
  --dz-ink: #f1f5f9;
  --dz-ink-2: #cbd5e1;
  --dz-ink-3: #7f8aa3;
  --dz-line: #233048;
  --dz-line-2: #1a2336;
  --dz-ok: #34d399;
  --dz-bad: #f87171;
  --dz-warn: #fb923c;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font: 16px/1.5 "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  background: var(--dz-bg); color: var(--dz-ink);
  -webkit-font-smoothing: antialiased; font-feature-settings: "ss01","cv11";
  transition: background .25s, color .25s;
}
button { font-family: inherit; cursor: pointer; }
.dz-root { min-height: 100vh; display: flex; flex-direction: column; }

/* Header — slim, no metrics */
.dz-hd {
  position: relative; display: flex; gap: 18px; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: var(--dz-panel); border-bottom: 1px solid var(--dz-line);
}
.dz-hd-left { display: flex; align-items: center; gap: 14px; }
.dz-logo { width: 36px; height: 36px; border-radius: 10px; background: var(--dz-ink); color: #a6f4c5; display: grid; place-items: center; }
[data-theme="dark"] .dz-logo { background: #f1f5f9; color: #0b1220; }
.dz-logo svg { width: 19px; height: 19px; }
.dz-champ-logo { height: 38px; width: auto; display: block; }
[data-theme="dark"] .dz-champ-logo { filter: brightness(0) invert(1); }
.dz-hd-title { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.dz-hd-x { color: var(--dz-ink-3); font-weight: 500; margin: 0 4px; }
.dz-hd-sub { font-size: 12.5px; color: var(--dz-ink-2); }
.dz-hd-right { display: flex; align-items: center; gap: 12px; }
.dz-hd-order { text-align: right; }
.dz-hd-order-eyebrow { font-size: 11px; color: var(--dz-ink-3); text-transform: uppercase; letter-spacing: 0.05em; }
.dz-hd-order-id { font-weight: 700; font-size: 15px; font-variant-numeric: tabular-nums; font-family: "JetBrains Mono", ui-monospace, monospace; }
.dz-hd-order-cust { font-size: 12.5px; color: var(--dz-ink-2); }
.dz-btn { height: 34px; padding: 0 14px; border: 1px solid var(--dz-line); background: var(--dz-panel); color: var(--dz-ink); border-radius: 8px; font-weight: 500; font-size: 13.5px; display: inline-flex; align-items: center; gap: 6px; }
.dz-btn:hover { background: var(--dz-line-2); }
.dz-btn.primary {
  background: var(--dz-accent); color: white; border-color: var(--dz-accent);
  box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 2px 4px rgba(15,23,42,0.18), 0 1px 0 rgba(15,23,42,0.06);
  transition: transform .08s, box-shadow .08s, filter .12s;
}
.dz-btn.primary:hover { filter: brightness(0.96); }
.dz-btn.primary:active { transform: translateY(1px); box-shadow: 0 2px 5px rgba(15,23,42,0.25) inset; }
.dz-btn.primary.pressed {
  transform: translateY(1px);
  box-shadow: 0 2px 6px rgba(15,23,42,0.28) inset, 0 0 0 1px rgba(15,23,42,0.08);
  background: color-mix(in srgb, var(--dz-accent) 88%, black);
}
.dz-btn.icon { width: 34px; padding: 0; justify-content: center; }
.dz-btn.icon svg { width: 16px; height: 16px; }
.dz-theme-toggle { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--dz-line); background: var(--dz-panel); color: var(--dz-ink); display: grid; place-items: center; }
.dz-theme-toggle:hover { background: var(--dz-line-2); }
.dz-theme-toggle svg { width: 15px; height: 15px; }
.dz-hd-progress { position: absolute; left: 0; right: 0; bottom: 0; height: 2px; background: var(--dz-line-2); }
.dz-hd-progress-fill { height: 100%; background: var(--dz-accent); transition: width .4s ease; }

/* QUADRANT GRID */
.dz-quads {
  display: grid;
  grid-template-columns: 1.25fr 0.75fr;
  grid-template-rows: minmax(315px, 1fr) minmax(270px, auto);
  gap: 18px;
  padding: 18px 22px;
  flex: 1; min-height: 0;
}
@media (max-width: 1100px) { .dz-quads { grid-template-columns: 1fr; grid-template-rows: auto; } }
.dz-quad {
  background: var(--dz-panel); border: 1px solid var(--dz-line); border-radius: 10px;
  box-shadow: 0 1px 2px rgba(11,20,38,0.04);
  display: flex; flex-direction: column; min-height: 0; overflow: hidden;
}
.dz-quad-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--dz-line-2);
}
.dz-quad-eyebrow { font-size: 10.5px; color: var(--dz-eyebrow); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
.dz-quad-title { font-size: 15px; font-weight: 700; margin-top: 3px; letter-spacing: -0.01em; color: var(--dz-ink); }
.dz-quad-note { font-size: 12px; font-weight: 500; color: var(--dz-ink-3); margin-left: 4px; }
.dz-quad-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: var(--dz-line-2); color: var(--dz-ink-2); }
.dz-quad-tag.live { background: rgba(6,118,71,0.10); color: var(--dz-ok); display: inline-flex; align-items: center; gap: 6px; }
.dz-quad-tag.live::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--dz-ok); animation: dz-blink 1.6s ease-in-out infinite; }
.dz-quad-body { flex: 1; min-height: 0; padding: 14px; overflow: auto; }

/* Q1 — Vertical pipeline */
.dz-pipe-v { display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; gap: 0; padding: 14px 8px; position: relative; }
.dz-pipe-row {
  flex: 1 1 0; min-width: 0;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 4px 6px; cursor: pointer; position: relative; text-align: center;
}
.dz-pipe-row + .dz-pipe-row::before {
  content: ''; position: absolute; top: 50px; right: calc(50% + 40px); left: auto; width: calc(100% - 80px); height: 2px; background: var(--dz-line); z-index: 0;
}
.dz-pipe-row.done + .dz-pipe-row::before,
.dz-pipe-row + .dz-pipe-row.done::before { background: var(--dz-ok); }
.dz-pipe-row + .dz-pipe-row.active::before,
.dz-pipe-row + .dz-pipe-row.fixing::before {
  background: linear-gradient(90deg, var(--dz-ok) 0%, var(--dz-accent) 60%);
}
.dz-node-wrap { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; }
.dz-node-ring-wrap { position: relative; width: 72px; height: 72px; background: var(--dz-panel); border-radius: 50%; }
.dz-node-ring { position: absolute; inset: 0; transform: rotate(-90deg); }
.dz-node-ring circle { fill: none; stroke-width: 4; }
.dz-node-ring .track { stroke: var(--dz-line); }
.dz-node-ring .fill { stroke: var(--dz-ok); stroke-linecap: round; transition: stroke-dashoffset .9s cubic-bezier(.3,.7,.4,1); }
.dz-node {
  position: absolute; inset: 8px;
  border-radius: 50%;
  background: var(--dz-panel); border: 1px solid var(--dz-line);
  display: grid; place-items: center;
  transition: transform .25s, border-color .25s, box-shadow .25s;
  box-shadow: 0 1px 3px rgba(15,23,42,0.05);
}
.dz-node.internal { background: var(--dz-line-2); border-style: dashed; }
.dz-node.active, .dz-node.fixing { transform: scale(1.05); box-shadow: 0 6px 22px rgba(31,79,176,0.18); border-color: var(--dz-accent); }
.dz-node.done { background: rgba(6,118,71,0.06); border-color: rgba(6,118,71,0.4); }
.dz-node-icon { width: 26px; height: 26px; color: var(--dz-ink-2); }
.dz-node.done .dz-node-icon { color: var(--dz-ok); }
.dz-node-icon svg { width: 100%; height: 100%; }
.dz-err-badge {
  position: absolute; top: 0; right: 0;
  min-width: 22px; height: 22px; padding: 0 6px; border-radius: 11px;
  background: var(--dz-bad); color: white; font-size: 12px; font-weight: 700;
  display: grid; place-items: center; border: 2px solid var(--dz-panel); z-index: 3;
}
.dz-ok-badge { position: absolute; top: 0; right: 0; width: 22px; height: 22px; border-radius: 11px; background: var(--dz-ok); display: grid; place-items: center; border: 2px solid var(--dz-panel); z-index: 3; }
.dz-ok-badge svg { width: 12px; height: 12px; }
.dz-pipe-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; align-items: center; max-width: 100%; }
.dz-pipe-label { font-weight: 600; font-size: 13.5px; line-height: 1.2; }
.dz-pipe-sub { font-size: 11.5px; color: var(--dz-ink-3); }
.dz-pipe-status { font-size: 11.5px; color: var(--dz-ink-2); margin-top: 2px; min-height: 18px; display: flex; align-items: center; gap: 6px; justify-content: center; }
.dz-pipe-status .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dz-pipe-row.active .dz-pipe-status, .dz-pipe-row.fixing .dz-pipe-status { color: var(--dz-accent); font-weight: 600; }
.dz-pipe-row.fixing .dz-pipe-status .dot { background: var(--dz-warn); animation: dz-blink 1.1s ease-in-out infinite; }
.dz-pipe-row.active .dz-pipe-status .dot { background: var(--dz-accent); animation: dz-blink 1.1s ease-in-out infinite; }
.dz-pipe-row.done .dz-pipe-status { color: var(--dz-ok); font-weight: 600; }
.dz-pipe-row.done .dz-pipe-status .dot { background: var(--dz-ok); }

/* Q2 — Agent reasoning */
.dz-agent { display: flex; flex-direction: column; gap: 16px; height: 100%; }
.dz-agent-top { display: flex; gap: 14px; align-items: flex-start; }
.dz-avatar { position: relative; width: 56px; height: 56px; flex-shrink: 0; }
.dz-avatar svg { width: 100%; height: 100%; }
.dz-avatar-pulse { position: absolute; inset: -3px; border-radius: 50%; border: 2px solid var(--dz-accent); opacity: 0; }
.dz-avatar.thinking .dz-avatar-pulse { animation: dz-pulse 1.6s ease-out infinite; }
.dz-agent-meta { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1; }
.dz-agent-meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.dz-kind { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; }
.dz-kind-reading { color: #1849a9; background: #eff4ff; }
.dz-kind-thinking { color: #5925dc; background: #f4ebff; }
.dz-kind-finding { color: var(--dz-bad); background: #FEE2E2; }
.dz-kind-fixing { color: #C2410C; background: #FFEDD5; }
.dz-kind-done { color: var(--dz-ok); background: #DCFCE7; }
[data-theme="dark"] .dz-kind-reading { color: #93c5fd; background: rgba(59,130,246,0.16); }
[data-theme="dark"] .dz-kind-thinking { color: #c4b5fd; background: rgba(167,139,250,0.16); }
[data-theme="dark"] .dz-kind-finding { color: #fda4af; background: rgba(244,63,94,0.16); }
[data-theme="dark"] .dz-kind-fixing { color: #fdba74; background: rgba(249,115,22,0.16); }
[data-theme="dark"] .dz-kind-done { color: #6ee7b7; background: rgba(52,211,153,0.16); }
.dz-agent-step { font-size: 12px; color: var(--dz-ink-3); margin-left: auto; font-variant-numeric: tabular-nums; }
.dz-agent-head { font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
.dz-agent-line { font-size: 17px; line-height: 1.55; }
.dz-agent-detail { font-size: 13.5px; color: var(--dz-ink-2); line-height: 1.55; padding: 12px 14px; background: var(--dz-line-2); border-radius: 10px; border-left: 3px solid var(--dz-accent); }
.dz-agent-detail.fixing { border-left-color: var(--dz-warn); }
.dz-agent-detail.finding { border-left-color: var(--dz-bad); }
.dz-agent-detail.done { border-left-color: var(--dz-ok); }
.dz-agent-tech {
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
  padding: 6px 10px 6px 8px; border-radius: 999px;
  background: rgba(31,79,176,0.08); border: 1px solid rgba(31,79,176,0.2);
  font-size: 12px;
}
.dz-agent-tech-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--dz-accent); box-shadow: 0 0 0 0 rgba(31,79,176,0.5); animation: dz-tech-pulse 1.6s ease-out infinite; flex-shrink: 0; }
@keyframes dz-tech-pulse { 0% { box-shadow: 0 0 0 0 rgba(31,79,176,0.45); } 70% { box-shadow: 0 0 0 8px rgba(31,79,176,0); } 100% { box-shadow: 0 0 0 0 rgba(31,79,176,0); } }
.dz-agent-tech-lbl { font-size: 10.5px; font-weight: 700; color: var(--dz-ink-3); text-transform: uppercase; letter-spacing: 0.06em; }
.dz-agent-tech-val { font-weight: 600; color: var(--dz-ink); font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11.5px; }
.dz-agent-resolve {
  display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
  padding: 9px 16px; border-radius: 8px;
  background: var(--dz-bad); color: white; border: 0;
  font-weight: 600; font-size: 13.5px; cursor: pointer;
  box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 2px 6px rgba(220,38,38,0.25);
  transition: filter .12s, transform .08s, box-shadow .08s;
}
.dz-agent-resolve:hover { filter: brightness(1.05); }
.dz-agent-resolve:active { transform: translateY(1px); box-shadow: 0 1px 2px rgba(220,38,38,0.25) inset; }
.dz-agent-resolve svg { width: 14px; height: 14px; }
.dz-agent-stage { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; background: var(--dz-line-2); font-size: 12px; font-weight: 600; color: var(--dz-ink-2); }

/* Q3 — Errors / explanation */
.dz-errs { display: flex; flex-direction: column; gap: 10px; }
.dz-errs-totals { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--dz-line-2); border-radius: 8px; }
.dz-errs-num { font-size: 22px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.dz-errs-totals-meta { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.dz-errs-totals-lbl { font-size: 10px; color: var(--dz-ink-3); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
.dz-errs-totals-sub { font-size: 11.5px; color: var(--dz-ink-2); }
.dz-errs-resolved { margin-left: auto; font-size: 11.5px; color: var(--dz-ok); font-weight: 600; white-space: nowrap; }

.dz-err-list { display: flex; flex-direction: column; gap: 8px; }
.dz-err-card { background: rgba(220,38,38,0.04); border: 1px solid rgba(220,38,38,0.25); border-radius: 8px; padding: 8px 11px; font-size: 12px; }
[data-theme="dark"] .dz-err-card { background: rgba(248,113,113,0.06); border-color: rgba(248,113,113,0.3); }
.dz-err-card.resolved { background: rgba(6,118,71,0.06); border-color: rgba(6,118,71,0.3); opacity: 0.95; }
.dz-err-card-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.dz-err-field { font-weight: 700; font-size: 13.5px; text-transform: capitalize; color: var(--dz-ink); }
.dz-err-stage { font-size: 11.5px; color: var(--dz-ink-3); font-weight: 500; }
.dz-err-tag { margin-left: auto; font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; color: var(--dz-ok); background: var(--dz-panel); border: 1px solid rgba(6,118,71,0.3); padding: 2px 7px; border-radius: 4px; text-transform: uppercase; }
.dz-err-card-hd { margin-bottom: 6px; gap: 6px; }
.dz-err-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 6px; }
.dz-err-card .dz-err-side { font-size: 10px; }
.dz-err-card .dz-err-val { font-size: 12.5px; }
.dz-err-card .dz-err-note { font-size: 11.5px; line-height: 1.4; }
.dz-err-side { font-size: 10.5px; color: var(--dz-ink-3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.dz-err-val { font-weight: 600; font-size: 13.5px; font-variant-numeric: tabular-nums; font-family: "JetBrains Mono", ui-monospace, monospace; word-break: break-all; }
.dz-err-val.email { color: #1849a9; }
[data-theme="dark"] .dz-err-val.email { color: #93c5fd; }
.dz-err-val.record { color: var(--dz-bad); }
.dz-err-card.resolved .dz-err-val.record { color: var(--dz-ok); }
.dz-err-arrow { color: var(--dz-ink-3); font-size: 16px; }
.dz-err-note { font-size: 12.5px; color: var(--dz-ink-2); line-height: 1.5; }
.dz-errs-empty { padding: 16px; background: rgba(6,118,71,0.06); border: 1px solid rgba(6,118,71,0.25); border-radius: 10px; color: var(--dz-ok); font-size: 13.5px; }

/* Q4 — Metrics */
.dz-metrics-table { width: 100%; border-collapse: collapse; font-size: 12.5px; background: var(--dz-panel); border: 1px solid var(--dz-line); border-radius: 10px; overflow: hidden; }
.dz-metrics-table thead th {
  text-align: left; font-size: 10px; font-weight: 700;
  color: var(--dz-ink-3); text-transform: uppercase; letter-spacing: 0.06em;
  background: var(--dz-line-2); padding: 8px 12px;
  border-bottom: 1px solid var(--dz-line);
}
.dz-metrics-table thead th.num { text-align: right; }
.dz-metrics-table tbody tr { cursor: pointer; transition: background .12s; }
.dz-metrics-table tbody tr:hover { background: rgba(31,79,176,0.04); }
.dz-metrics-table tbody tr.open { background: rgba(31,79,176,0.06); }
.dz-metrics-table tbody td { padding: 8px 12px; border-bottom: 1px solid var(--dz-line-2); vertical-align: middle; }
.dz-metrics-table tbody tr:last-child td { border-bottom: 0; }
.dz-metrics-table td.lbl { font-weight: 600; color: var(--dz-ink-2); }
.dz-metrics-table td.num { text-align: right; }
.dz-metrics-table td.val { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 13px; color: var(--dz-ink); }
.dz-metrics-table td.target { color: var(--dz-ink-3); font-size: 11.5px; }
.dz-metrics-table td.info { width: 24px; text-align: center; }
.dz-metric-info { display: inline-grid; place-items: center; width: 16px; height: 16px; border-radius: 50%; background: var(--dz-line); color: var(--dz-ink-2); font-size: 10px; font-weight: 700; line-height: 1; }
.dz-metrics-table tr.open .dz-metric-info { background: var(--dz-accent); color: white; }
.dz-metrics-table tr.detail-row { cursor: default; background: var(--dz-line-2); }
.dz-metrics-table tr.detail-row:hover { background: var(--dz-line-2); }
.dz-metrics-table tr.detail-row td { padding: 8px 12px 12px; border-bottom: 1px solid var(--dz-line-2); }
.dz-metric-tip { font-size: 11.5px; color: var(--dz-ink-2); line-height: 1.45; }

/* Tooltip */
.dz-tip {
  position: absolute; bottom: calc(100% + 8px); left: 0;
  width: 260px; background: var(--dz-ink); color: white;
  padding: 10px 12px; border-radius: 10px;
  font-size: 12px; line-height: 1.5; font-weight: 400;
  box-shadow: 0 12px 32px rgba(15,23,42,0.25);
  opacity: 0; pointer-events: none; transform: translateY(4px);
  transition: opacity .15s, transform .15s;
  z-index: 50; text-transform: none; letter-spacing: 0;
}
[data-theme="dark"] .dz-tip { background: #f1f5f9; color: #0b1220; }
.dz-tip strong { display: block; font-weight: 700; margin-bottom: 3px; font-size: 12.5px; }
.dz-metric:hover .dz-tip, .dz-tippable:hover .dz-tip { opacity: 1; transform: translateY(0); }
.dz-tip.r { left: auto; right: 0; }
.dz-tip.down { bottom: auto; top: calc(100% + 8px); }

/* Below-fold */
.dz-below { padding: 48px 28px 80px; border-top: 1px solid var(--dz-line); background: var(--dz-bg); }
.dz-below-hd { margin-bottom: 28px; max-width: 880px; }
.dz-eyebrow { font-size: 11.5px; color: var(--dz-eyebrow); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 8px; }
.dz-below-hd h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin: 0; line-height: 1.2; }
.dz-handoff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
@media (max-width: 760px) { .dz-handoff-grid { grid-template-columns: 1fr; } }
.dz-handoff-card { background: var(--dz-panel); border: 1px solid var(--dz-line); border-radius: 10px; padding: 18px 20px; position: relative; cursor: help; }
.dz-handoff-card-label { font-size: 12.5px; font-weight: 700; color: var(--dz-ink-2); text-transform: uppercase; letter-spacing: 0.04em; }
.dz-handoff-card-nums { display: flex; align-items: baseline; gap: 7px; margin-top: 10px; }
.dz-handoff-card-big { font-size: 34px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.dz-handoff-card-small { font-size: 13px; color: var(--dz-ink-3); }
.dz-handoff-card-bar { margin-top: 12px; height: 6px; background: var(--dz-line-2); border-radius: 4px; overflow: hidden; }
.dz-handoff-card-fill { height: 100%; background: var(--dz-accent); }
.dz-handoff-card-pct { margin-top: 6px; font-size: 12.5px; color: var(--dz-ink-2); font-variant-numeric: tabular-nums; }
.dz-etypes { background: var(--dz-panel); border: 1px solid var(--dz-line); border-radius: 10px; padding: 20px 24px; margin-bottom: 28px; }
.dz-etypes-hd { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.dz-etypes-rows { display: flex; flex-direction: column; gap: 10px; }
.dz-etypes-row { display: grid; grid-template-columns: minmax(160px, 200px) 1fr 70px 60px; align-items: center; gap: 12px; font-size: 13.5px; position: relative; }
.dz-etypes-bar { height: 7px; background: var(--dz-line-2); border-radius: 4px; overflow: hidden; }
.dz-etypes-fill { height: 100%; background: var(--dz-accent); }
.dz-etypes-nums { font-variant-numeric: tabular-nums; color: var(--dz-ink-2); text-align: right; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12.5px; }
.dz-etypes-pct { font-variant-numeric: tabular-nums; font-weight: 700; text-align: right; font-size: 13.5px; }

/* Floating bottom-right control panel */
.dz-floater {
  position: fixed; right: 22px; bottom: 22px; z-index: 80;
  background: var(--dz-panel); border: 1px solid var(--dz-line); border-radius: 16px;
  box-shadow: 0 16px 40px rgba(15,23,42,0.18);
  width: 300px; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
}
.dz-floater.collapsed { padding: 8px 12px; }
.dz-floater-body { display: flex; flex-direction: column; gap: 12px; }
.dz-floater-hd { display: flex; align-items: center; justify-content: space-between; cursor: move; user-select: none; touch-action: none; }
.dz-floater-grip { color: var(--dz-ink-3); font-size: 14px; line-height: 1; letter-spacing: -2px; cursor: move; }
.dz-floater-title { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 8px; }
.dz-floater-title-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dz-ink-3); }
.dz-floater-actions { display: flex; gap: 6px; }
.dz-floater-btn { width: 30px; height: 30px; padding: 0; border: 1px solid var(--dz-line); background: var(--dz-panel); color: var(--dz-ink); border-radius: 8px; display: grid; place-items: center; }
.dz-floater-btn:hover { background: var(--dz-line-2); }
.dz-floater-btn svg { width: 14px; height: 14px; }
.dz-floater-btn.primary {
  background: var(--dz-accent); color: white; border-color: var(--dz-accent);
  width: auto; padding: 0 12px; font-size: 13px; font-weight: 600;

.dz-floater-btn.primary:active { transform: translateY(1px); box-shadow: 0 2px 5px rgba(15,23,42,0.25) inset; }

.dz-floater-note { font-size: 11px; color: var(--dz-ink-3); line-height: 1.4; font-style: italic; }
.dz-floater-row { display: flex; gap: 8px; }
.dz-select { flex: 1; height: 32px; padding: 0 10px; border: 1px solid var(--dz-line); background: var(--dz-panel); color: var(--dz-ink); border-radius: 8px; font-size: 13px; font-family: inherit; }
.dz-segmented { display: flex; background: var(--dz-line-2); border-radius: 8px; padding: 3px; }

function PipelineV({ stages, stageState, errorsByStage, stageProgress, statusByStage }) {
  const R = 32; const C = 2 * Math.PI * R;
  return (
    <div className="dz-pipe-v">
      {stages.map((s) => {
        const state = stageState[s.id] || 'pending';
        const errs = errorsByStage[s.id] || [];
        const progress = stageProgress[s.id] ?? 0;
        const offset = C * (1 - progress);
        const isDone = state === 'done';
        const status = statusByStage[s.id] || (state === 'pending' ? 'Pending' : state === 'done' ? '✓ Validated' : 'Working…');
        return (
          <div className={`dz-pipe-row ${state}`} key={s.id}>
            <div className="dz-node-wrap">
              <div className="dz-node-ring-wrap">
                <svg className="dz-node-ring" viewBox="0 0 72 72">
                  <circle className="track" cx="36" cy="36" r={R} />
                  <circle className="fill"  cx="36" cy="36" r={R}
                    strokeDasharray={C} strokeDashoffset={offset} />
                </svg>
                <div className={`dz-node ${state} ${s.internal ? 'internal' : ''}`}>
                  <div className="dz-node-icon">{STAGE_ICONS[s.id]}</div>
                  {errs.length > 0 && <div className="dz-err-badge">{errs.length}</div>}
                  {isDone && errs.length === 0 && (
                    <div className="dz-ok-badge">
                      <svg viewBox="0 0 14 14"><path d="M3 7.4l2.6 2.6L11 4.5" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>

              <div className="dz-pipe-label">{s.label}</div>
              <div className="dz-pipe-sub">{s.sub}{s.internal ? ' · internal' : ''}</div>
              <div className="dz-pipe-status"><span className="dot"/>{status}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

        <rect x="18.5" y="13.5" width="2.5" height="3" rx="1" fill={stroke}>
          <animate attributeName="height" values="3;3;0.3;3" keyTimes="0;0.85;0.92;1" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="y"      values="13.5;13.5;14.85;13.5" keyTimes="0;0.85;0.92;1" dur="2s" repeatCount="indefinite"/>
        </rect>
        {sad
          ? <path d="M12 22c1.2-1.2 2.5-1.8 4-1.8s2.8.6 4 1.8" stroke={stroke} strokeWidth="1.4" strokeLinecap="round" fill="none"/>
          : <path d="M12 20c1.2 1 2.5 1.5 4 1.5s2.8-.5 4-1.5" stroke={stroke} strokeWidth="1.4" strokeLinecap="round" fill="none"/>}
      </svg>
      <div className="dz-avatar-pulse" />
    </div>
  );
}

function AgentReasoning({ scene, idx, total, onResolve }) {
  if (!scene) return null;
  const labelByKind = { reading: 'Reading', thinking: 'Reasoning', finding: 'Finding', fixing: 'Resolving', done: 'Complete' };
  const isFinding = scene.kind === 'finding';
  return (
    <div className="dz-agent">
      <div className="dz-agent-top">
        <AgentAvatar thinking={scene.kind === 'thinking' || scene.kind === 'reading'} sad={isFinding} />
        <div className="dz-agent-meta">
          <div className="dz-agent-meta-row">
            <span className={`dz-kind dz-kind-${scene.kind}`}>{labelByKind[scene.kind]}</span>
            <span className="dz-agent-stage">{window.STAGE_LABEL[scene.stage]}</span>
            <span className="dz-agent-step">Step {idx + 1} / {total}</span>
          </div>
          <div className="dz-agent-head">{scene.headline}</div>
        </div>
      </div>
      <div className="dz-agent-line">{scene.line}</div>
      {scene.detail && <div className={`dz-agent-detail ${scene.kind}`}>{scene.detail}</div>}
      {scene.tech && (
        <div className="dz-agent-tech">
          <span className="dz-agent-tech-pulse" />
          <span className="dz-agent-tech-lbl">Working on</span>
          <span className="dz-agent-tech-val">{scene.tech}</span>
        </div>
      )}
      {isFinding && (
        <button type="button" className="dz-agent-resolve" onClick={onResolve}>
          Resolve before continuing
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </button>
      )}
    </div>
  );
}

function ErrorsPanel({ errors, resolvedIds, scenario, stages }) {
  const open = errors.filter(e => !e.resolved);
  const closed = errors.filter(e => e.resolved);
  const totalDef = Object.keys(scenario.errors).length;
  const caughtAt = stages.filter(s => errors.some(e => e.stage === s.id && !e.resolved)).map(s => s.label);
  return (
    <div className="dz-errs">
      <div className="dz-errs-totals">
        <div className="dz-errs-num">{open.length}</div>
        <div className="dz-errs-totals-meta">
          <div className="dz-errs-totals-lbl">Open discrepancies</div>
          <div className="dz-errs-totals-sub">{caughtAt.length ? `caught at ${caughtAt.join(' · ')}` : (open.length === 0 && closed.length === 0 ? 'none surfaced yet' : 'all resolved')}</div>
        </div>
        <div className="dz-errs-resolved">{resolvedIds.size} of {totalDef} resolved</div>
      </div>
      {open.length === 0 && closed.length === 0 && (
        <div className="dz-errs-empty">No discrepancies surfaced yet. Every field on every record matches the email thread.</div>
      )}
      <div className="dz-err-list">
        {open.map(e => <ErrorCard key={e.id} err={e} />)}
        {closed.map(e => <ErrorCard key={e.id} err={e} resolved />)}
      </div>
    </div>
  );
}

function ErrorCard({ err, resolved }) {
  const fieldLbl = err.field.replace(/_/g, ' ');
  return (
    <div className={`dz-err-card ${resolved ? 'resolved' : ''}`}>
      <div className="dz-err-card-hd">
        <span className="dz-err-field">{fieldLbl}</span>
        <span className="dz-err-stage">at {window.STAGE_LABEL[err.stage]}</span>
        {resolved && <span className="dz-err-tag">resolved</span>}
      </div>
      <div className="dz-err-grid">
        <div><div className="dz-err-side">From email</div><div className="dz-err-val email">{err.email}</div></div>
        <div className="dz-err-arrow">→</div>
        <div><div className="dz-err-side">In record</div><div className="dz-err-val record">{err.record}</div></div>
      </div>
      <div className="dz-err-note">{err.note}</div>
    </div>
  );
}

function MetricsPanel({ metrics }) {
  const items = [
    { lbl: 'Email classifier accuracy',   val: `${Math.round(metrics.classification_accuracy*100)}%`, tip: 'How often the agent correctly tells a work email from a personal email.' },
    { lbl: 'Error detection accuracy',    val: `${(metrics.error_detection_rate*100).toFixed(1)}%`,   tip: 'Of all the real mistakes in the test set, the share the agent caught.' },
    { lbl: 'False positive',              val: `${(metrics.false_positive_rate*100).toFixed(1)}%`,    tip: 'The agent flagged a field as wrong, but it was actually correct.' },
    { lbl: 'False negative',              val: `${(metrics.false_negative_rate*100).toFixed(1)}%`,    tip: 'A real mistake existed but the agent missed it.' },
    { lbl: 'Avg. time / thread',          val: `${metrics.avg_processing_time.toFixed(1)}s`,           tip: 'Average time the agent takes to validate one email thread end-to-end.' },
  ];
  const [openIdx, setOpenIdx] = useState(null);
  return (
    <table className="dz-metrics-table">
      <thead>
        <tr>
          <th>Metric</th>
          <th className="num">Value</th>
          <th aria-label="Info"></th>
        </tr>
      </thead>
      <tbody>
        {items.map((m, i) => {
          const isOpen = openIdx === i;
          return (
            <React.Fragment key={m.lbl}>
              <tr className={isOpen ? 'open' : ''} onClick={() => setOpenIdx(isOpen ? null : i)}>
                <td className="lbl">{m.lbl}</td>
                <td className="num val">{m.val}</td>
                <td className="info"><span className="dz-metric-info">{isOpen ? '−' : 'i'}</span></td>
              </tr>
              {isOpen && (
                <tr className="detail-row">
                  <td colSpan={3}><div className="dz-metric-tip">{m.tip}</div></td>
                </tr>
              )}
            </React.Fragment>
          );
        })}
      </tbody>
    </table>
  );
}

function useScenario(scenarioId, stagesMode, autoplay, speed) {
  const scenario = window.SCENARIOS[scenarioId];
  const stages = stagesMode === 'four' ? window.STAGES_FOUR : window.STAGES_FULL;
  const stageIds = stages.map(s => s.id);
  const scenes = useMemo(() => scenario.scenes.filter(sc => stageIds.includes(sc.stage)), [scenario, stagesMode]);
  const [idx, setIdx] = useState(0);
  const [playing, setPlaying] = useState(autoplay);
  const [resolvedIds, setResolvedIds] = useState(new Set());
  const [activeErrorIds, setActiveErrorIds] = useState(new Set());

  useEffect(() => { setIdx(0); setResolvedIds(new Set()); setActiveErrorIds(new Set()); setPlaying(autoplay); }, [scenarioId, stagesMode, autoplay]);

  useEffect(() => {
    const a = new Set(); const r = new Set();
    for (let i = 0; i <= idx; i++) {
      const op = scenes[i]?.op; if (!op) continue;
      (op.add || []).forEach(e => a.add(e));
      (op.resolve || []).forEach(e => r.add(e));
    }
    setActiveErrorIds(a); setResolvedIds(r);
  }, [idx, scenes]);

  useEffect(() => {
    if (!playing) return;
    const sc = scenes[idx]; if (!sc) return;
    if (sc.kind === 'finding') return;
    const dwell = { reading: 3000, thinking: 2800, fixing: 3600, done: 4400 }[sc.kind] || 3000;
    const t = setTimeout(() => {
      setIdx(i => Math.min(i + 1, scenes.length - 1));
      if (idx >= scenes.length - 1) setPlaying(false);
    }, dwell / speed);
    return () => clearTimeout(t);
  }, [idx, playing, scenes, speed]);

  return { scenario, scenes, stages, idx, setIdx, playing, setPlaying, activeErrorIds, resolvedIds };
}

function App() {
  const [scenarioId, setScenarioId] = useState('hero_elbow');
  const [stagesMode, setStagesMode] = useState('six');
  const [autoplay, setAutoplay] = useState(true);
  const [speed, setSpeed] = useState(1.0);
  const [theme, setTheme] = useState('light');

  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  const { scenario, scenes, stages, idx, setIdx, playing, setPlaying, activeErrorIds, resolvedIds } =
    useScenario(scenarioId, stagesMode, autoplay, speed);

  const currentScene = scenes[idx];
  const activeStageIdx = currentScene ? stages.findIndex(s => s.id === currentScene.stage) : -1;

  const stageState = {};
  stages.forEach((s, i) => {
    if (i < activeStageIdx) stageState[s.id] = 'done';
    else if (i === activeStageIdx) stageState[s.id] = currentScene?.kind === 'fixing' ? 'fixing' : 'active';
    else stageState[s.id] = 'pending';
  });
  if (idx === scenes.length - 1) stages.forEach(s => { stageState[s.id] = 'done'; });

  const stageProgress = {};
  stages.forEach((s, i) => {
    if (i < activeStageIdx) stageProgress[s.id] = 1;
    else if (i > activeStageIdx) stageProgress[s.id] = 0;
    else {
      const stageScenes = scenes.filter(sc => sc.stage === s.id);
      const passedHere = scenes.slice(0, idx + 1).filter(sc => sc.stage === s.id).length;
      stageProgress[s.id] = stageScenes.length ? passedHere / stageScenes.length : 0;
    }
  });
  if (idx === scenes.length - 1) stages.forEach(s => { stageProgress[s.id] = 1; });

  const errorsByStage = useMemo(() => {
    const out = {}; stages.forEach(s => { out[s.id] = []; });
    Object.entries(scenario.errors).forEach(([id, err]) => {
      if (activeErrorIds.has(id) && !resolvedIds.has(id) && out[err.stage]) out[err.stage].push({ id, ...err });
    });
    return out;
  }, [scenario, activeErrorIds, resolvedIds, stages]);

  // Per-row status text for the pipeline
  const statusByStage = {};
  stages.forEach((s, i) => {
    if (stageState[s.id] === 'done') {
      const errAtStage = Object.entries(scenario.errors).filter(([, e]) => e.stage === s.id);
      statusByStage[s.id] = errAtStage.length ? '✓ Resolved' : '✓ Validated';
    } else if (stageState[s.id] === 'active') {
      statusByStage[s.id] = currentScene?.kind === 'finding' ? `⚠ ${currentScene.headline}` : (currentScene?.headline || 'Working…');
    } else if (stageState[s.id] === 'fixing') {
      statusByStage[s.id] = currentScene?.headline || 'Resolving…';
    } else {
      statusByStage[s.id] = 'Pending';
    }
  });

  const errorsListItems = useMemo(() => {
    const out = [];
    Object.entries(scenario.errors).forEach(([id, err]) => {
      if (activeErrorIds.has(id) || resolvedIds.has(id))
        out.push({ id, ...err, resolved: resolvedIds.has(id) });
    });
    return out;
  }, [scenario, activeErrorIds, resolvedIds]);

  return (
    <div className="dz-root">
      <header className="dz-hd">
        <div className="dz-hd-left">
          <img className="dz-champ-logo" src="assets/champion-fiberglass-logo.svg" alt="Champion Fiberglass" />
          <div>
            <div className="dz-hd-title">Champion Fiberglass <span className="dz-hd-x">×</span> DeltaZero</div>
          </div>
        </div>
        <div className="dz-hd-right">
          <button className="dz-theme-toggle" onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} aria-label="Toggle theme">
            {theme === 'light'
              ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
              : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M16.9 16.9l2.1 2.1M4.9 19.1l2.1-2.1M16.9 7.1l2.1-2.1"/></svg>}
          </button>
          <button className="dz-btn icon" onClick={() => { setIdx(0); setPlaying(true); }} aria-label="Restart">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.7"><path d="M2 8a6 6 0 1 0 1.5-4M2 3v3.5h3.5"/></svg>
          </button>
          <button className={`dz-btn primary ${playing ? 'pressed' : ''}`} aria-pressed={playing} onClick={() => setPlaying(p => !p)}>{playing ? 'Pause' : 'Play'}</button>
        </div>
        <div className="dz-hd-progress"><div className="dz-hd-progress-fill" style={{ width: `${((idx+1)/scenes.length) * 100}%` }} /></div>
      </header>

      <div className="dz-quads">
        {/* Q1 — Pipeline */}
        <div className="dz-quad">
          <div className="dz-quad-hd">
            <div>
              <div className="dz-quad-eyebrow">01 · Pipeline</div>
              <div className="dz-quad-title">Order moves through six stages</div>
            </div>
          </div>
          <div className="dz-quad-body">
            <PipelineV stages={stages} stageState={stageState} errorsByStage={errorsByStage} stageProgress={stageProgress} statusByStage={statusByStage} />
          </div>
        </div>

        {/* Q2 — Agent reasoning */}
        <div className="dz-quad">
          <div className="dz-quad-hd">
            <div>
              <div className="dz-quad-eyebrow">02 · GUARD Multi-LLM Agent</div>
            </div>
            <span className="dz-quad-tag">Step {idx + 1} / {scenes.length}</span>
          </div>
          <div className="dz-quad-body">
            <AgentReasoning scene={currentScene} idx={idx} total={scenes.length} onResolve={() => setIdx(i => Math.min(i + 1, scenes.length - 1))} />
          </div>
        </div>

        {/* Q3 — Errors / explanation */}
        <div className="dz-quad">
          <div className="dz-quad-hd">
            <div>
              <div className="dz-quad-eyebrow">03 · Discrepancies</div>
              <div className="dz-quad-title">What was caught — and where</div>
            </div>
            <span className="dz-quad-tag">{errorsListItems.filter(e => !e.resolved).length} open · {errorsListItems.filter(e => e.resolved).length} resolved</span>
          </div>
          <div className="dz-quad-body">
            <ErrorsPanel errors={errorsListItems} resolvedIds={resolvedIds} scenario={scenario} stages={stages} />
          </div>
        </div>

        {/* Q4 — Metrics */}
        <div className="dz-quad">
          <div className="dz-quad-hd">
            <div>
              <div className="dz-quad-eyebrow">04 · Performance</div>
              <div className="dz-quad-title">Global performance — 149 email threads, 346 quotes, 346 work orders</div>
            </div>
          </div>
          <div className="dz-quad-body">
            <MetricsPanel metrics={window.METRICS} />
          </div>
        </div>
      </div>

      <BelowFold metrics={window.METRICS} stageAccuracy={window.STAGE_ACCURACY} errorTypes={window.ERROR_TYPES} />

      <Floater
        scenario={scenarioId} onScenario={setScenarioId}
        stagesMode={stagesMode} onStagesMode={setStagesMode}
        autoplay={autoplay} onAutoplay={setAutoplay}
        speed={speed} onSpeed={setSpeed}
        playing={playing} onPlayPause={() => setPlaying(p => !p)}
        onRestart={() => { setIdx(0); setPlaying(true); }} />
    </div>
  );
}

function BelowFold({ metrics, stageAccuracy, errorTypes }) {
  return (
    <section className="dz-below">
      <div className="dz-below-hd">
        <div className="dz-eyebrow">Global performance — 149 email threads · 346 quotes · 346 work orders</div>
        <h2>Where errors get caught — and how accurately.</h2>
      </div>
      <div className="dz-handoff-grid">
        {stageAccuracy.map(s => (
          <div key={s.stage} className="dz-handoff-card dz-tippable">
            <div className="dz-handoff-card-label">{s.label}</div>
            <div className="dz-handoff-card-nums">
              <span className="dz-handoff-card-big">{s.caught}</span>
              <span className="dz-handoff-card-small">/ {s.total} caught</span>
            </div>
            <div className="dz-handoff-card-bar"><div className="dz-handoff-card-fill" style={{ width: `${s.rate*100}%` }} /></div>
            <div className="dz-handoff-card-pct">{(s.rate*100).toFixed(1)}% detection</div>
            <div className="dz-tip down"><strong>{s.label}</strong>{s.tip}</div>
          </div>
        ))}
      </div>
      <div className="dz-etypes">
        <div className="dz-etypes-hd">Detection rate by error type</div>
        <div className="dz-etypes-rows">
          {errorTypes.map(e => (
            <div key={e.type} className="dz-etypes-row dz-tippable">
              <div>{e.label}</div>
              <div className="dz-etypes-bar"><div className="dz-etypes-fill" style={{ width: `${e.rate*100}%` }} /></div>
              <div className="dz-etypes-nums">{e.detected}/{e.injected}</div>
              <div className="dz-etypes-pct">{(e.rate*100).toFixed(1)}%</div>
              <div className="dz-tip down"><strong>{e.label}</strong>{e.tip}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Floater({ scenario, onScenario, stagesMode, onStagesMode, autoplay, onAutoplay, speed, onSpeed, playing, onPlayPause, onRestart }) {
  const [collapsed, setCollapsed] = useState(false);
  // pos: null = anchored bottom-right via CSS; once user drags, becomes {left, top}.
  const [pos, setPos] = useState(null);
  const dragRef = React.useRef(null);

  const onHeadPointerDown = (e) => {
    if (e.target.closest('button')) return;
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const startX = e.clientX, startY = e.clientY;
    const baseLeft = r.left, baseTop = r.top;
    e.preventDefault();
    const move = (ev) => {
      const w = panel.offsetWidth, h = panel.offsetHeight;
      const left = Math.min(window.innerWidth - w - 8, Math.max(8, baseLeft + (ev.clientX - startX)));
      const top  = Math.min(window.innerHeight - h - 8, Math.max(8, baseTop + (ev.clientY - startY)));
      setPos({ left, top });
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  const style = pos ? { left: pos.left, top: pos.top, right: 'auto', bottom: 'auto' } : null;

  return (
    <div ref={dragRef} className={`dz-floater ${collapsed ? 'collapsed' : ''}`} style={style}>
      <div className="dz-floater-hd" onPointerDown={onHeadPointerDown}>
        <span className="dz-floater-title">
          <span className="dz-floater-grip" aria-hidden="true">⋮⋮</span>
          <span className="dz-floater-title-dot"/>DeltaZero panel
        </span>
        <div className="dz-floater-actions">
          <button className="dz-floater-btn" onClick={onRestart} aria-label="Restart">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M2 8a6 6 0 1 0 1.5-4M2 3v3.5h3.5"/></svg>
          </button>
          <button className={`dz-floater-btn primary ${playing ? 'pressed' : ''}`} aria-pressed={playing} onClick={onPlayPause}>{playing ? 'Pause' : 'Play'}</button>
          <button className="dz-floater-btn" onClick={() => setCollapsed(c => !c)} aria-label={collapsed ? 'Expand' : 'Collapse'} aria-expanded={!collapsed}>
            {collapsed
              ? <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 6l4 4 4-4"/></svg>
              : <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M4 10l4-4 4 4"/></svg>}
          </button>
        </div>
      </div>
      {!collapsed && (
        <div className="dz-floater-body">
          <div className="dz-floater-section">
            <div className="dz-floater-section-lbl">Scenario</div>
            <select className="dz-select" value={scenario} onChange={e => onScenario(e.target.value)}>
              {Object.values(window.SCENARIOS).map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div className="dz-floater-section">
            <div className="dz-floater-section-lbl">Stages</div>
            <div className="dz-segmented">
              <button className={`dz-segmented-btn ${stagesMode === 'four' ? 'active' : ''}`} onClick={() => onStagesMode('four')}>4 customer</button>
              <button className={`dz-segmented-btn ${stagesMode === 'six' ? 'active' : ''}`} onClick={() => onStagesMode('six')}>All 6</button>
            </div>
          </div>
          <div className="dz-floater-section">
            <div className="dz-floater-section-lbl">Playback speed</div>
            <div className="dz-floater-speed">
              <input type="range" min="0.5" max="3" step="0.25" value={speed} onChange={e => onSpeed(parseFloat(e.target.value))} />
              <div className="dz-floater-speed-val">{speed.toFixed(2)}×</div>
            </div>
            <div className="dz-floater-note">Speed affects narration only — for prototype/demo purposes.</div>
          </div>
          <div className="dz-floater-section">
            <div className="dz-floater-row">
              <button className="dz-floater-btn" style={{ width: '100%' }} onClick={() => onAutoplay(!autoplay)}>
                <span style={{ fontSize: 12.5, fontWeight: 600 }}>Autoplay: {autoplay ? 'On' : 'Off'}</span>
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
